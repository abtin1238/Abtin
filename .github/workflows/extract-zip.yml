name: Extract ZIP into Repo

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.zip'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract ZIP into repo root
        run: |
          shopt -s nullglob
          zips=(*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "No .zip file found in repo root - nothing to extract."
            exit 0
          fi
          mkdir -p _extracted
          for z in "${zips[@]}"; do
            echo "Extracting: $z"
            unzip -o "$z" -d _extracted
          done

          # If the zip contained a single top-level folder, use its contents
          entries=(_extracted/*)
          if [ ${#entries[@]} -eq 1 ] && [ -d "${entries[0]}" ]; then
            SRC="${entries[0]}"
          else
            SRC="_extracted"
          fi

          # Never overwrite the workflow files themselves
          rm -rf "$SRC/.github"

          cp -r "$SRC"/. .
          rm -rf _extracted
          rm -f *.zip

      - name: Commit extracted files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add -A
          git commit -m "Extract project from zip [skip ci]" || echo "Nothing to commit"
          git push
