name: Build Abtin APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.5"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Ensure platform folders
        run: |
          flutter create --platforms=android,ios --org ir.abtin --project-name abtin_navigator .

      - name: Wire real Android package/manifest/gradle config
        run: bash tool/ci_prepare_android.sh

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons || true

      - name: Install native sqlite3 (needed by `flutter test` on Linux host)
        run: sudo apt-get update -y && sudo apt-get install -y libsqlite3-dev

      - name: Unit tests (offline core)
        run: |
          flutter test test/routing_engine_test.dart test/offline_complete_test.dart --reporter expanded

      - name: Disable minify for stable CI build
        run: |
          set +e
          for GRADLE in android/app/build.gradle android/app/build.gradle.kts; do
            [ -f "$GRADLE" ] || continue
            if ! grep -q "minifyEnabled true\|isMinifyEnabled = true" "$GRADLE"; then
              if [[ "$GRADLE" == *.kts ]]; then
                sed -i '/release {/a\            isMinifyEnabled = false\n            isShrinkResources = false' "$GRADLE"
              else
                sed -i '/release {/a\            minifyEnabled false\n            shrinkResources false' "$GRADLE"
              fi
            fi
          done
          cp -f build_config/proguard-rules.pro android/app/proguard-rules.pro 2>/dev/null || true

      - name: Build release APK (split-per-abi)
        run: flutter build apk --release --split-per-abi --tree-shake-icons

      - name: List APKs
        run: ls -lah build/app/outputs/flutter-apk/ || true

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: abtin-apks
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
