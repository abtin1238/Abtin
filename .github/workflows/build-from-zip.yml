name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect ZIP or use repository root
        shell: bash
        run: |
          set -e

          shopt -s nullglob
          zips=(*.zip)

          if [ ${#zips[@]} -gt 0 ]; then
            echo "ZIP found. Building from ZIP..."

            mkdir -p _extracted

            unzip -o "${zips[0]}" -d _extracted

            # پیدا کردن پوشه‌ای که pubspec.yaml دارد
            PROJECT_DIR=$(find _extracted -name pubspec.yaml -printf '%h\n' | head -n 1)

            if [ -n "$PROJECT_DIR" ]; then
              echo "Flutter project found in ZIP: $PROJECT_DIR"

              cp -r "$PROJECT_DIR"/. .

              rm -rf _extracted
              rm -f ./*.zip
            else
              echo "No Flutter project found in ZIP."
              echo "Using repository root."
              rm -rf _extracted
            fi

          else
            echo "No ZIP found."
            echo "Building from repository root."
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk