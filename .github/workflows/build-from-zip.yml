name: Extract ZIP and Build APK
on:
  push:
    branches: [ main, master ]
    paths:
      - '**.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract ZIP into repo root
        run: |
          shopt -s nullglob
          zips=(*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "No .zip file found in repo root - nothing to extract."
            exit 0
          fi
          mkdir -p _extracted
          for z in "${zips[@]}"; do
            echo "Extracting: $z"
            unzip -o "$z" -d _extracted
          done

          # If the zip contained a single top-level folder, use its contents
          entries=(_extracted/*)
          if [ ${#entries[@]} -eq 1 ] && [ -d "${entries[0]}" ]; then
            SRC="${entries[0]}"
          else
            SRC="_extracted"
          fi

          # Never overwrite the workflow files themselves
          rm -rf "$SRC/.github"

          cp -r "$SRC"/. .
          rm -rf _extracted
          rm -f *.zip

      - name: Commit extracted files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add -A
          git commit -m "Extract project from zip [skip ci]" || echo "Nothing to commit"
          git push

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner (drift codegen)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode release keystore
        if: ${{ secrets.ABTIN_KEYSTORE_BASE64 != '' }}
        env:
          ABTIN_KEYSTORE_BASE64: ${{ secrets.ABTIN_KEYSTORE_BASE64 }}
        run: |
          echo "$ABTIN_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore.jks
          echo "ABTIN_KEYSTORE_PATH=android/app/release.keystore.jks" >> "$GITHUB_ENV"

      - name: Build APK (release)
        env:
          ABTIN_KEYSTORE_PASSWORD: ${{ secrets.ABTIN_KEYSTORE_PASSWORD }}
          ABTIN_KEY_ALIAS: ${{ secrets.ABTIN_KEY_ALIAS }}
          ABTIN_KEY_PASSWORD: ${{ secrets.ABTIN_KEY_PASSWORD }}
          ABTIN_VERSION_CODE: ${{ github.run_number }}
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: abtin-navigator-apk
          path: build/app/outputs/flutter-apk/app-release.apk
