name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Download Vazirmatn fonts
        run: |
          mkdir -p assets/fonts
          curl -L -o vazirmatn.zip https://github.com/rastikerdar/vazirmatn/releases/latest/download/vazirmatn-font-face.zip
          unzip -o vazirmatn.zip -d vazirmatn_tmp
          find vazirmatn_tmp -iname "Vazirmatn-Regular.ttf" -exec cp {} assets/fonts/ \;
          find vazirmatn_tmp -iname "Vazirmatn-Medium.ttf" -exec cp {} assets/fonts/ \;
          find vazirmatn_tmp -iname "Vazirmatn-Bold.ttf" -exec cp {} assets/fonts/ \;
          find vazirmatn_tmp -iname "Vazirmatn-ExtraBold.ttf" -exec cp {} assets/fonts/ \;
          ls -la assets/fonts/

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner (drift codegen)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: abtin-navigator-apk
          path: build/app/outputs/flutter-apk/app-release.apk
