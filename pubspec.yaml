name: abtin_navigator
description: "آبتین — مسیریاب هوشمند آفلاین سه‌بعدی"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Map engine (Native, GPU-accelerated, vector tiles, 3D) ---
  # آپدیت شده به نسخه‌ی جدیدتر برای سازگاری با Flutter 3.x
  maplibre_gl: ^0.26.2

  # --- State management / DI ---
  flutter_riverpod: ^2.5.1

  # --- Navigation/Routing (app-internal screen routing, not GPS routing) ---
  go_router: ^14.2.0

  # --- Local database (Saved Places, POI index, route cache) ---
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # --- GPS / Location (used from Phase 5 onward, wired now for permission flow) ---
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # --- شتاب‌سنج گوشی (برای اتصال واقعی سرعت‌سنج به سنسور فیزیکی و فیوژن با GPS) ---
  sensors_plus: ^6.1.1

  # --- Deep Linking (اپ‌های دیگر مثل اسنپ بتوانند مسیریابی را صدا بزنند) ---
  app_links: ^6.1.1

  # --- HTTP Client (برای درخواست‌های API مسیریابی) ---
  http: ^1.2.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/models/
